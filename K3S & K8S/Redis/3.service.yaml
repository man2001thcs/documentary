# 1. Headless Service (Required for StatefulSet Pod Identity)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis-set
  labels:
    app: redis
spec:
  ports:
  - port: 6379
    name: redis
  clusterIP: None  # <--- This makes it "Headless"
  selector:
    app: redis
---
# 2. Client Service (For your Apps to connect to)
apiVersion: v1
kind: Service
metadata:
  name: redis-client
  namespace: redis-set
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: redis
  type: ClusterIP