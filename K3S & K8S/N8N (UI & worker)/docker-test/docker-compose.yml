version: "3.8"

services:
  n8n:
    image: man2001thcs/n8n:20251002-1 
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: "Asia/Ho_Chi_Minh"
      TZ: "Asia/Ho_Chi_Minh"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_USER_FOLDER: /home/n8nuser
      N8N_SECURE_COOKIE: true
    volumes:
      # - ./n8n_data:/home/n8nuser/.n8n
      # tmpfs mounts for writable dirs
      - ./n8n_user_data:/home/n8nuser/.n8n
      - ./n8n_user_cache:/home/n8nuser/.cache
      - ./n8n_mc:/home/n8nuser/.mc
      - ./n8n_npm:/home/n8nuser/.npm
      - ./n8n_psql:/opt/psql_history
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /var/run
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true             # root filesystem is read-only
    user: "2000:2000"           # non-root UID:GID
    tmpfs:                      # needed because rootfs is read-only
      - /tmp
      - /var/run

  pg-emr:
    image: codedao88/enr:postgresql-13
    container_name: pg-test
    ports:
    - 5432:5432
    volumes:
    - ./data-config:/bitnami/postgresql/data
    - ./data:/var/lib/pgsql/data
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replication
      POSTGRESQL_REPLICATION_PASSWORD: Emr@2023
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: Emr@2023
      POSTGRESQL_DATABASE: postgres
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: codedao88/minio:local-20231004
    container_name: minio-test
    ports:
    - 9000:9000
    - 9001:9001
    volumes:
    - ./storage:/data
    environment:
      MINIO_ROOT_USER: default
      MINIO_ROOT_PASSWORD: Emr@2023
    command: server --console-address ":9001" /data
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 2

volumes:
  n8n_data:
    driver: local
