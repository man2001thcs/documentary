apiVersion: v1
kind: Namespace
metadata:
  name: oracle-dg
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tnsnames-config
  namespace: oracle-dg
data:
  tnsnames.ora: |
    DG11=
    (DESCRIPTION =
      (ADDRESS = (PROTOCOL = TCP)(HOST = DG11)(PORT = 1521))
      (CONNECT_DATA =
        (SERVER = DEDICATED)
        (SID = DG11)
      )
    )
    DG21=
    (DESCRIPTION =
      (ADDRESS = (PROTOCOL = TCP)(HOST = DG21)(PORT = 1521))
      (CONNECT_DATA =
        (SERVER = DEDICATED)
        (SID = DG11)
      )
    )
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: oracle-db-sc
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dg11-pv
spec:
  capacity:
    storage: 70Gi
  accessModes:
  - ReadWriteMany
  storageClassName: oracle-db-sc
  local:
    path: /opt/oradata/dg11
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - emr-local-1
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: dg21-pv
spec:
  capacity:
    storage: 70Gi
  accessModes:
  - ReadWriteMany
  storageClassName: oracle-db-sc
  local:
    path: /opt/oradata/dg21
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - emr-local-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dg11-pvc
  namespace: oracle-dg
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: oracle-db-sc
  resources:
    requests:
      storage: 70Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dg21-pvc
  namespace: oracle-dg
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: oracle-db-sc
  resources:
    requests:
      storage: 70Gi
