apiVersion: apps/v1
kind: Deployment
metadata:
  name: quick-consumer
  namespace: kafka-set
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quick-consumer
  template:
    metadata:
      labels:
        app: quick-consumer
    spec:
      containers:
      - name: consumer
        image: bitnamilegacy/kafka:3.7.1-debian-12-r9
        command:
          - /bin/bash
          - -c
          - |
            # This keeps the container alive and consuming
            /opt/bitnami/kafka/bin/kafka-console-consumer.sh \
              --bootstrap-server kafka-0.kafka-headless.kafka-set.svc.cluster.local:9092,kafka-1.kafka-headless.kafka-set.svc.cluster.local:9092,kafka-2.kafka-headless.kafka-set.svc.cluster.local:9092 \
              --topic blood \
              --group test-group-1 \
              --from-beginning