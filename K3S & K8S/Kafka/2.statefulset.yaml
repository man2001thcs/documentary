apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka-set
spec:
  serviceName: "kafka-headless"
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      # Ensures Kafka pods are distributed across different nodes
      # affinity:
      #   podAntiAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #     - labelSelector:
      #         matchExpressions:
      #         - key: app
      #           operator: In
      #           values: [ "kafka" ]
      #       topologyKey: "kubernetes.io/hostname"
      containers:
      - name: kafka
        image: bitnamilegacy/kafka:3.7.1-debian-12-r9

        command:
        - /bin/bash
        - -ec
        - |
          # Extract index from pod name (e.g., kafka-0 -> 0)
          export KAFKA_CFG_NODE_ID=${HOSTNAME##*-}

          # Manually set the advertised listener since $KAFKA_CFG_NODE_ID is now set

          # 2. Define all 3 listeners (Internal, External, and Controller)
          export EXT_PORT=$((30090 + ${HOSTNAME##*-}))
          export KAFKA_CFG_LISTENERS="INTERNAL://:9092,EXTERNAL://:${EXT_PORT},CONTROLLER://:9093"

          # 3. Define how they are advertised
          export KAFKA_CFG_ADVERTISED_LISTENERS="INTERNAL://${HOSTNAME}.kafka-headless.kafka-set.svc.cluster.local:9092,EXTERNAL://10.145.37.209:${EXT_PORT}"

          # 4. Map them all to a security protocol
          export KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP="INTERNAL:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT"

          # 5. Set the inter-broker listener
          export KAFKA_CFG_SASL_ENABLED_MECHANISMS="PLAIN"
          export KAFKA_CFG_INTER_BROKER_LISTENER_NAME="INTERNAL"

          /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: KAFKA_CFG_NODE_ID_COMMAND
          value: "hostname | awk -F'-' '{print $NF}'"

        - name: KAFKA_CFG_PROCESS_ROLES
          value: controller,broker
        - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
          value: "0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
        - name: KAFKA_KRAFT_CLUSTER_ID
          value: "abcdefghijklmnopqrstuv" # Use a unique 22-character base64 ID
        - name: KAFKA_CFG_LISTENERS
          value: PLAINTEXT://:9092,CONTROLLER://:9093
        - name: KAFKA_CFG_ADVERTISED_LISTENERS
          value: PLAINTEXT://$(KAFKA_CFG_NODE_ID).kafka-headless:9092
        - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
          value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

        - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
          value: PLAINTEXT

        - name: KAFKA_CLIENT_USERS
          value: "brody"
        - name: KAFKA_CLIENT_PASSWORDS
          value: "caineHeart"

        ports:
        - containerPort: 9092
          name: client
        - containerPort: 9093
          name: controller
        volumeMounts:
        - name: data
          mountPath: /bitnami/kafka
          subPath: data

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteMany" ]
      storageClassName: "longhorn-hdd"
      resources:
        requests:
          storage: 20Gi
