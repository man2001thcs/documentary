apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka-set
  labels:
    app: kafka
    
spec:
  ports:
  - name: tcp-client
    port: 9092
  - name: tcp-controller
    port: 9093
  clusterIP: None
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-client
  namespace: kafka-set
  labels:
    app: kafka
spec:
  ports:
  - name: tcp-client
    port: 9092
  selector:
    app: kafka

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-client-lb
  namespace: kafka-set
  labels:
    app: kafka
spec:
  type: LoadBalancer
  ports:
  - name: tcp-client
    port: 30090

  selector:
    statefulset.kubernetes.io/pod-name: kafka-0
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-client-1-lb
  namespace: kafka-set
  labels:
    app: kafka
spec:
  type: LoadBalancer
  ports:
  - name: tcp-client
    port: 30091

  selector:
    statefulset.kubernetes.io/pod-name: kafka-1
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-client-2-lb
  namespace: kafka-set
  labels:
    app: kafka
spec:
  type: LoadBalancer
  ports:
  - name: tcp-client
    port: 30092

  selector:
    statefulset.kubernetes.io/pod-name: kafka-2
---
