apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring-stuff
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---

apiVersion: v1
kind: Service
metadata:
  name: prometheus-np
  namespace: monitoring-stuff
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30150
