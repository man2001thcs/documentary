apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring-stuff
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s

    scrape_configs:
    - job_name: 'otel-collector'
      static_configs:
      - targets: [ '10.168.6.214:30140' ]

    - job_name: 'otel-collector-test'
      static_configs:
      - targets: [ '10.168.6.213:30141' ]
