apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring-stuff
data:
  loki-config.yaml: |+
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
      chunk_idle_period: 5m
      max_chunk_age: 1h
      chunk_retain_period: 30s
      wal:
        enabled: true
        dir: /var/loki/wal

    schema_config:
      configs:
        - from: 2024-06-27
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
      filesystem:
        directory: /var/loki/chunks

    compactor:
      working_directory: /var/loki/compactor
      delete_request_store: filesystem    # fix: needed for retention
      retention_enabled: true
      retention_delete_delay: 2h          # optional, wait before deleting
      retention_delete_worker_count: 150  # optional, speed of deletes

    limits_config:
      retention_period: 120h
      allow_structured_metadata: true

    table_manager:
      retention_deletes_enabled: true
      retention_period: 120h

      
