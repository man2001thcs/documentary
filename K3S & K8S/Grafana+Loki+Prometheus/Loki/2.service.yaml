apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring-stuff
spec:
  selector:
    app: loki
  ports:
  - name: http
    port: 3100
    targetPort: 3100
---

apiVersion: v1
kind: Service
metadata:
  name: loki-np
  namespace: monitoring-stuff
spec:
  type: NodePort
  selector:
    app: loki
  ports:
  - name: http
    port: 3100
    targetPort: 3100
    nodePort: 30110
