apiVersion: v1
kind: Service
metadata:
  name: otel-collector-test
  namespace: monitoring-stuff
spec:
  selector:
    app: otel-collector-test
  ports:
  - name: grpc
    port: 4317
    targetPort: 4317
  - name: http
    port: 4318
    targetPort: 4318
---

apiVersion: v1
kind: Service
metadata:
  name: otel-collector-test-np
  namespace: monitoring-stuff
spec:
  type: NodePort
  selector:
    app: otel-collector-test
  ports:
  - name: grpc
    port: 4317
    targetPort: 4317
  - name: http
    port: 4318
    targetPort: 4318
    nodePort: 30131
  - name: http-2
    port: 9464
    targetPort: 9464
    nodePort: 30141
