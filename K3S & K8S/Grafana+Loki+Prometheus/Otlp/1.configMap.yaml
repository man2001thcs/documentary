apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: monitoring-stuff
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [ 100us, 1ms, 2ms, 6ms, 10ms, 100ms, 250ms ]
        dimensions:
        - name: http.method
          default: GET
        - name: http.status_code
        - name: host.name
        exemplars:
          enabled: true
        dimensions_cache_size: 1000
        aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
        metrics_flush_interval: 15s
        metrics_expiration: 5m
        events:
          enabled: true
          dimensions:
          - name: exception.type
          - name: exception.message
        resource_metrics_key_attributes:
        - service.name
        - telemetry.sdk.language
        - telemetry.sdk.name

    exporters:
      debug:
        verbosity: detailed

      prometheus:
        endpoint: "0.0.0.0:9464"

      otlphttp/logs:
        endpoint: "http://10.168.4.131:30110/otlp"
        tls:
          insecure: true

      otlphttp/tempo:
        endpoint: http://10.168.4.131:30120
        tls:
          insecure: true
      

    service:
      pipelines:
        traces:
          receivers: [ otlp ]
          processors: [ batch ]
          exporters: [ otlphttp/tempo, spanmetrics ]

        metrics:
          receivers: [ otlp, spanmetrics ]
          processors: [ batch ]
          exporters: [ debug, prometheus ]

        logs:
          receivers: [ otlp ]
          processors: [ batch ]
          exporters: [ otlphttp/logs ]
