apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring-stuff
spec:
  selector:
    app: tempo
  ports:
  - name: http
    port: 3200
    targetPort: 3200
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
---

apiVersion: v1
kind: Service
metadata:
  name: tempo-np
  namespace: monitoring-stuff
spec:
  type: NodePort
  selector:
    app: tempo
  ports:
  - name: http
    port: 3200
    targetPort: 3200
    nodePort: 30160
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
    nodePort: 30120
